owner: paperclipinc
repo: status

sites:
  - name: paperclip.inc
    url: https://paperclip.inc
  - name: Health API
    url: https://paperclip.inc/api/health

i18n:
  allSystemsOperational: All systems operational
  activeIncidents: Active incidents
  pastIncidents: Past incidents
  pastScheduledMaintenance: Past scheduled maintenance
  footer: "This page is [open source]($REPO), powered by [Upptime](https://upptime.js.org)"

status-website:
  cname: status.paperclip.inc
  logoUrl: https://paperclip.inc/favicon.svg
  favicon: https://paperclip.inc/favicon.ico
  faviconSvg: https://paperclip.inc/favicon.svg
  name: Paperclip.inc Status
  introTitle: "**[paperclip.inc](https://paperclip.inc)** system status"
  introMessage: Real-time uptime data powered by [Upptime](https://github.com/upptime/upptime). Monitored every 5 minutes via GitHub Actions.
  navbar:
    - title: Status
      href: /
    - title: paperclip.inc
      href: https://paperclip.inc
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  metaTags:
    - name: theme-color
      content: "#f7f7f4"
  links:
    - rel: preconnect
      href: https://fonts.googleapis.com
    - rel: preconnect
      href: https://fonts.gstatic.com
    - rel: stylesheet
      href: https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap
  css: |
    /* paperclip.inc brand override — light theme */
    :root {
      --body-background-color: #f7f7f4 !important;
      --body-text-color: #26251e !important;
      --card-background-color: #fafaf7 !important;
      --card-border-color: rgba(38, 37, 30, 0.08) !important;
      --nav-background-color: rgba(247, 247, 244, 0.85) !important;
      --nav-border-bottom-color: rgba(38, 37, 30, 0.08) !important;
      --nav-current-border-bottom-color: #26251e !important;
      --down-border-left-color: #b91c1c !important;
      --down-background-color: rgba(185, 28, 28, 0.06) !important;
      --down-color-color: #26251e !important;
      --degraded-border-left-color: #a16207 !important;
      --degraded-color-color: #26251e !important;
      --up-border-left-color: #166534 !important;
      --up-color-color: #26251e !important;
      --tag-color: #f7f7f4 !important;
      --tag-up-background-color: #166534 !important;
      --tag-down-background-color: #b91c1c !important;
      --tag-degraded-background-color: #a16207 !important;
      --change-background-color: rgba(161, 98, 7, 0.1) !important;
      --code-color: #26251e !important;
      --code-background-color: rgba(38, 37, 30, 0.05) !important;
      --error-button-border-color: rgba(38, 37, 30, 0.2) !important;
      --error-button-background-color: transparent !important;
      --error-button-color: #26251e !important;
      --submit-button-background-color: #26251e !important;
      --submit-button-color: #f7f7f4 !important;
      --submit-button-border-color: #26251e !important;
      --graph-opacity: 1 !important;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
      background: #f7f7f4 !important;
      color: #26251e !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
      color: #26251e !important;
      letter-spacing: -0.01em;
    }

    h3 { opacity: 1 !important; color: #6b6a64 !important; }

    a {
      color: #26251e !important;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-color: rgba(38, 37, 30, 0.3);
      transition: text-decoration-color 0.15s ease;
    }
    a:hover { text-decoration-color: #26251e !important; }

    nav {
      position: sticky !important;
      top: 0 !important;
      z-index: 100 !important;
      background: rgba(247, 247, 244, 0.85) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border-bottom: 1px solid rgba(38, 37, 30, 0.08) !important;
      padding: 0 !important;
    }
    nav .container { padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; }
    nav a { color: #6b6a64 !important; transition: color 0.15s ease; text-decoration: none !important; }
    nav a:hover { color: #26251e !important; }
    nav .logo div { color: #26251e !important; font-weight: 600 !important; font-size: 0.95rem !important; }

    nav ul a {
      position: relative !important;
      padding-bottom: 2px !important;
      font-size: 0.875rem !important;
      font-weight: 500 !important;
    }
    nav ul a::after {
      content: '' !important;
      position: absolute !important;
      bottom: -2px !important;
      left: 0 !important;
      width: 100% !important;
      height: 2px !important;
      background: #26251e !important;
      transform: scaleX(0) !important;
      transform-origin: center !important;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
    }
    nav ul a:hover::after { transform: scaleX(1) !important; }
    [aria-current] { color: #26251e !important; border-bottom: none !important; }
    [aria-current]::after { transform: scaleX(1) !important; }

    article {
      background: #fafaf7 !important;
      border: 1px solid rgba(38, 37, 30, 0.08) !important;
      border-radius: 12px !important;
    }
    article.up { border-left: 3px solid #166534 !important; }
    article.down { border-left: 3px solid #b91c1c !important; }
    article.degraded { border-left: 3px solid #a16207 !important; }
    article.down-active {
      background: rgba(185, 28, 28, 0.06) !important;
      border-color: rgba(185, 28, 28, 0.3) !important;
    }
    article + article { margin-top: 0.75rem !important; }

    .tag {
      border-radius: 9999px !important;
      font-size: 0.75rem !important;
      font-weight: 600 !important;
      padding: 0.25rem 0.75rem !important;
      color: #f7f7f4 !important;
    }

    footer {
      color: #6b6a64 !important;
      border-top: 1px solid rgba(38, 37, 30, 0.08) !important;
    }
    footer a { color: #6b6a64 !important; }
    footer a:hover { color: #26251e !important; }

    form label { color: #6b6a64 !important; font-size: 0.875rem !important; }
    input[type="radio"]:checked + label { color: #26251e !important; }

    .lead { color: #6b6a64 !important; }
    .changed h2 { color: #26251e !important; }
    .changed + section .data { background: rgba(161, 98, 7, 0.1) !important; }
    .loading svg { stroke: #6b6a64 !important; }

    .container { max-width: 800px !important; }

    .submit-button {
      background: #26251e !important;
      color: #f7f7f4 !important;
      border: none !important;
      border-radius: 8px !important;
      font-weight: 600 !important;
    }
    a.error-button {
      border-color: rgba(38, 37, 30, 0.2) !important;
      background: transparent !important;
      color: #26251e !important;
      border-radius: 8px !important;
    }
